<!-- This is a sample Open Graph image HTML that can be converted to an image -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #f44336 0%, #ff6b6b 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .container {
            max-width: 900px;
            padding: 40px;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #f44336;
            font-size: 24px;
        }
        .title {
            font-size: 72px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 36px;
            font-weight: 400;
            opacity: 0.9;
            line-height: 1.4;
        }
        .beta {
            display: inline-block;
            background: #fed7aa;
            color: #9a3412;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 600;
            margin-left: 20px;
            transform: translateY(-10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="/brickbuilder-logo.png" alt="BrickBuilder AI" style="width:80px;height:80px;" /></div>
        <div class="title">
            BrickBuilder<span style="color:#ffe0de">.AI</span>
        </div>
        <div class="subtitle">
            Transform any image or text into buildable<br>LEGO compatible brick models
        </div>
    </div>
</body>
</html>
